  addImg(){
    const region=document.getElementById('add-img-region')?.value||'';
    const name=document.getElementById('add-img-type')?.value||'';
    if(!region){alert('부위를 먼저 선택해 주세요');return;}
    if(!name){alert('검사 종류를 선택해 주세요');return;}
    if((S.editSc.imaging||[]).find(x=>x.name===name)){alert('이미 추가된 검사입니다');return;}
    const isStackType=name.startsWith('CT')||name.startsWith('MRI');
    S.editSc.imaging.push({name,delayMinutes:5,displayMode:isStackType?'stack':'pages',images:[null],resultType:'image',report:'',abnormal:false});
    this.renderEd();
  },
  /* 영상 정상/이상 토글 → 이상 설정 시 같은 부위 다른 검사 일관성 점검 */
  onImgAbnormalChange(idx){
    const img=S.editSc.imaging[idx];if(!img) return;
    img.abnormal=(document.getElementById(`imd-abn-${idx}`)?.value==='abnormal');
    if(!img.abnormal) return;
    const regions=imgRegionsOf(img.name);
    const related=new Set();
    regions.forEach(r=>(IMG_REGION_MAP[r]||[]).forEach(n=>{if(n!==img.name) related.add(n);}));
    const needNormal=[],needUnconfigured=[];
    related.forEach(n=>{
      const other=(S.editSc.imaging||[]).find(i=>i.name===n);
      if(other){ if(!other.abnormal) needNormal.push(n); }
      else needUnconfigured.push(n);
    });
    if(!needNormal.length&&!needUnconfigured.length) return;
    S._relatedToAdd=needUnconfigured;
    let body=`<p style="line-height:1.8"><strong>${esc(img.name)}</strong>을(를) <strong style="color:#b02010">이상소견</strong>으로 설정했습니다.<br>같은 부위(<strong>${esc(regions.join(', '))}</strong>)의 아래 검사들은 현재 <strong>정상</strong>으로 표시됩니다. 학생이 처방하면 환자 상태가 불일치하게 보일 수 있으니 이상소견을 작성해 주세요.</p>`;
    if(needNormal.length) body+=`<div style="margin-top:10px"><div class="el">설정됨 · 정상 → 이상소견 작성 필요</div><ul style="margin:4px 0 0 18px;line-height:1.7">${needNormal.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div>`;
    if(needUnconfigured.length) body+=`<div style="margin-top:10px"><div class="el">미설정 → 추가 후 이상소견 작성 권장</div><ul style="margin:4px 0 0 18px;line-height:1.7">${needUnconfigured.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div>`;
    const addBtn=needUnconfigured.length?`<button class="btn btn-gray" onclick="App.addRelatedImaging()">미설정 검사 추가</button>`:'';
    this.openModal(`<div class="modal-hd">부위 일관성 확인<button onclick="App.closeModal()">✕</button></div><div class="modal-bd">${body}</div><div class="modal-ft">${addBtn}<button class="btn btn-hdr2" onclick="App.closeModal()">확인</button></div>`);
  },
  /* 미설정 관련 검사 일괄 추가 (이상소견으로 표시) */
  addRelatedImaging(){
    (S._relatedToAdd||[]).forEach(n=>{
      if((S.editSc.imaging||[]).find(x=>x.name===n)) return;
      const isStack=n.startsWith('CT')||n.startsWith('MRI');
      S.editSc.imaging.push({name:n,delayMinutes:5,displayMode:isStack?'stack':'pages',images:[null],resultType:'image',report:'',abnormal:true});
    });
    S._relatedToAdd=null;this.closeModal();this.renderEd();
  },
  rmImg(idx){S.editSc.imaging.splice(idx,1);this.renderEd();},

    const img=S.editSc.imaging[idx];
    const old=img.images||[];
    img.images=Array.from({length:cnt},(_,i)=>old[i]||null);
    this.renderEd();

  upImgSlot(e,idx,si){

    const r=new FileReader();
    r.onload=ev=>{
      if(!S.editSc.imaging[idx].images) S.editSc.imaging[idx].images=[];

      this.renderEd();

  clearImgSlot(idx,si){S.editSc.imaging[idx].images[si]=null;this.renderEd();},
  saveImgOrder(idx){

    img.delayMinutes=parseInt(document.getElementById(`imd-d-${idx}`)?.value||'5');
    img.displayMode=document.getElementById(`imd-mode-${idx}`)?.value||'pages';
    img.resultType=document.getElementById(`imd-rtype-${idx}`)?.value||'image';

      <div class="modal-bd">

  upImgFolder(e,idx){
    const files=[...e.target.files].filter(f=>f.type.startsWith('image/'));
    if(!files.length) return;
    files.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
    const imgs=new Array(files.length);let loaded=0;
    files.forEach((file,i)=>{
      const r=new FileReader();
      r.onload=ev=>{imgs[i]=ev.target.result;loaded++;
        if(loaded===files.length){S.editSc.imaging[idx].images=imgs;this.renderEd();}
      };r.readAsDataURL(file);
    });
  },

  saveSc(){
    const sc=S.editSc;
    sc.name=document.getElementById('ed-name').value.trim();
    sc.description=document.getElementById('ed-desc')?.value.trim()||'';
    if(!sc.name){alert('제목을 입력해 주세요');return;}
    sc.patient.id=document.getElementById('ed-pid')?.value.trim()||'';
    sc.patient.name=document.getElementById('ed-pname').value.trim();
    sc.patient.age=document.getElementById('ed-page').value;
    sc.patient.ageMonths=parseInt(document.getElementById('ed-pmonth')?.value)||0;
    sc.patient.sex=document.getElementById('ed-psex').value;
    sc.patient.chiefComplaint=document.getElementById('ed-pcc').value.trim();
    sc.patient.pastHistory=document.getElementById('ed-phx2')?.value.trim()||'';
    sc.patient.history=document.getElementById('ed-phx').value.trim();
    ['SBP','DBP','HR','RR','SpO2','Temp'].forEach(k=>{sc.patient.vitals[k]=document.getElementById(`ed-vt-${k}`)?.value||'';});
    delete sc.patient.vitals.BP;delete sc.patient.vitals.GCS;
    sc.patient.mentalStatus={
      type:document.querySelector('input[name="ms-type"]:checked')?.value||'GCS',
      E:parseInt(document.getElementById('ms-E')?.value)||4,
      V:parseInt(document.getElementById('ms-V')?.value)||5,
      M:parseInt(document.getElementById('ms-M')?.value)||6,
      avpu:document.getElementById('ms-avpu')?.value||'A',
    };
    /* 혈액검사 처방 */
    sc.labOrders.forEach((ord,oi)=>{
      ord.delayMinutes=parseInt(document.getElementById(`ord-d-${oi}`)?.value||'7');
      ord.failMessage=document.getElementById(`ord-fail-${oi}`)?.value.trim()||'';
      (ord.resultSets||[]).forEach((rs,si)=>{
        rs.items=rs.items.map((item,ii)=>({
          n:item.n,
          v:document.getElementById(`ord-${oi}-${si}-v-${ii}`)?.value||'',
        }));
      });
    });
    /* BGA */
    ['abga','vbga'].forEach(key=>{
      if(!sc[key]) return;
      sc[key].delayMinutes=parseInt(document.getElementById(`${key}-delay`)?.value||'3');
      sc[key].failMessage=document.getElementById(`${key}-fail`)?.value.trim()||'';
      (sc[key].resultSets||[]).forEach((rs,si)=>{
        const def=key==='vbga'?VBGA_DEF:ABGA_DEF;
        rs.items=def.map(item=>({n:item.n,v:document.getElementById(`${key}-${si}-${item.n}`)?.value||''}));
      });
    });
    /* 영상 */
    sc.imaging.forEach((img,idx)=>{
      img.delayMinutes=parseInt(document.getElementById(`imd-d-${idx}`)?.value||'5');
      img.displayMode=document.getElementById(`imd-mode-${idx}`)?.value||'stack';
      const cnt=parseInt(document.getElementById(`imd-cnt-${idx}`)?.value||'1');
      if(!img.images) img.images=[];
      img.images=img.images.slice(0,cnt);
      while(img.images.length<cnt) img.images.push(null);
    });
    const ei=S.scenarios.findIndex(s=>s.id===sc.id);
    if(ei>=0) S.scenarios[ei]=sc; else S.scenarios.push(sc);
    if(S.scenario?.id===sc.id) S.scenario=sc;
    save();
    // 저장 후 페이지 유지 + 버튼에 성공 표시
    const btn=document.getElementById('save-btn');
    if(btn){const orig=btn.innerHTML;btn.innerHTML='✓ 저장됨';btn.style.background='#52c28f';setTimeout(()=>{btn.innerHTML=orig;btn.style.background='';},2000);}
  },

  /* ═══ 미리보기 (편집 중 시나리오를 전공의 화면으로 임시 실행 — 저장/실제세션 영향 없음) ═══ */
  previewScenario(){
    const sc=JSON.parse(JSON.stringify(S.editSc));
    // 폼의 미저장 기본정보 동기화 (저장은 하지 않음)
    const g=id=>document.getElementById(id);
    sc.name=g('ed-name')?.value.trim()||sc.name;
    if(sc.patient){
      if(!sc.patient.vitals) sc.patient.vitals={};
      sc.patient.id=g('ed-pid')?.value.trim()||sc.patient.id||'';
      sc.patient.name=g('ed-pname')?.value.trim()||sc.patient.name||'';
      if(g('ed-page')) sc.patient.age=g('ed-page').value;
      sc.patient.ageMonths=parseInt(g('ed-pmonth')?.value)||0;
      sc.patient.sex=g('ed-psex')?.value||sc.patient.sex;
      if(g('ed-pcc')) sc.patient.chiefComplaint=g('ed-pcc').value.trim();
      ['SBP','DBP','HR','RR','SpO2','Temp'].forEach(k=>{const el=g('ed-vt-'+k);if(el) sc.patient.vitals[k]=el.value;});

  /* ── Mental Status 편집기 ── */
  renderMentalStatusEd(ms,age){
    const type=ms?.type||'GCS';
    const infant=parseInt(age)<2;
    const E=ms?.E??4, V=ms?.V??5, M=ms?.M??6, avpu=ms?.avpu??'A';
    const EL=[[4,'4 — 자발적 개안'],[3,infant?'3 — 소리에 개안':'3 — 말소리에 개안'],[2,'2 — 통증에 개안'],[1,'1 — 없음']];
    const VL=infant?[[5,'5 — 옹알이/웃음'],[4,'4 — 보채는 울음'],[3,'3 — 통증에 울음'],[2,'2 — 신음'],[1,'1 — 없음']]:[[5,'5 — 지남력 있음'],[4,'4 — 혼동'],[3,'3 — 부적절한 단어'],[2,'2 — 이해 불가'],[1,'1 — 없음']];
    const ML=[[6,infant?'6 — 정상 자발운동':'6 — 명령 이행'],[5,infant?'5 — 접촉에 움츠림':'5 — 통증 위치 파악'],[4,'4 — 통증에 움츠림'],[3,'3 — 비정상 굴곡'],[2,'2 — 신전'],[1,'1 — 없음']];
    const tot=parseInt(E)+parseInt(V)+parseInt(M);
    return `<div style="display:flex;align-items:center;gap:16px;margin-bottom:8px">
      <label style="display:flex;align-items:center;gap:4px"><input type="radio" name="ms-type" value="GCS" ${type==='GCS'?'checked':''} onchange="App.onMSTypeChange()"> GCS</label>
      <label style="display:flex;align-items:center;gap:4px"><input type="radio" name="ms-type" value="AVPU" ${type==='AVPU'?'checked':''} onchange="App.onMSTypeChange()"> AVPU</label>
      ${infant?'<span style="font-size:10px;color:#7a5000;background:#fff3cd;padding:2px 6px;border-radius:3px">영아 기준 (&lt;2세)</span>':''}
    </div>
    <div id="ms-gcs-section" ${type!=='GCS'?'style="display:none"':''}>

        <div><div class="el">Verbal (V)${infant?' — 영아':''}</div><select class="fc" id="ms-V">${VL.map(([v,l])=>`<option value="${v}" ${V==v?'selected':''}>${esc(l)}</option>`).join('')}</select></div>
        <div><div class="el">Motor (M)</div><select class="fc" id="ms-M">${ML.map(([v,l])=>`<option value="${v}" ${M==v?'selected':''}>${esc(l)}</option>`).join('')}</select></div>

    <div id="ms-avpu-section" ${type!=='AVPU'?'style="display:none"':''}>

        <option value="A" ${avpu==='A'?'selected':''}>A — Alert (각성)</option>
        <option value="V" ${avpu==='V'?'selected':''}>V — Voice (소리에 반응)</option>

  },

  updateMentalStatus(){
    const container=document.getElementById('mental-status-ed');if(!container) return;
    const age=parseInt(document.getElementById('ed-page')?.value)||0;
    const ms={
      type:document.querySelector('input[name="ms-type"]:checked')?.value||'GCS',
      E:parseInt(document.getElementById('ms-E')?.value)||4,
      V:parseInt(document.getElementById('ms-V')?.value)||5,
      M:parseInt(document.getElementById('ms-M')?.value)||6,
      avpu:document.getElementById('ms-avpu')?.value||'A',
    };
    container.innerHTML=this.renderMentalStatusEd(ms,age);
  },

  openModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-ov').classList.remove('hidden');},
  closeModal(){document.getElementById('modal-ov').classList.add('hidden');},
};

/* ═══ PACS ═══ */
PACS.go=function(delta,absolute){
  if(absolute!==undefined) this.idx=absolute;
  else this.idx=Math.max(0,Math.min(this.stack.length-1,this.idx+delta));
  const img=document.getElementById('pacs-img'),info=document.getElementById('pacs-info'),sl=document.getElementById('pacs-sl');
  if(img) img.src=this.stack[this.idx];
  if(info) info.textContent=`${this.idx+1} / ${this.stack.length}`;
  if(sl) sl.value=this.idx;
  // Pages 모드 썸네일 동기화
  const strip=document.getElementById('thumb-strip');
  if(strip){[...strip.querySelectorAll('[id^="thumb-"]')].forEach((el,i)=>{el.style.borderColor=i===this.idx?'#4a9':'#333';});}
};
PACS.goPage=function(idx){this.go(0,idx);};

/* ═══ 유틸 ═══ */
function uuid(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtT(ts){return ts?new Date(ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'—';}
/* 나이 표시: 1세 이상 "N세[ M개월]", 0세는 "M개월"(개월 0이면 "0세") */
function fmtAge(pt){
  const ys=String(pt?.age??'').trim();
  const y=parseInt(ys), m=parseInt(pt?.ageMonths)||0;
  const yy=isNaN(y)?null:y;
  if(yy==null&&!m) return ys||'—';
  if((yy||0)>=1) return m>0?`${yy}세 ${m}개월`:`${yy}세`;
  return m>0?`${m}개월`:'0세';
}
/* CBC 등 나이 기반 정상값 계산용 — 연+월/12 (연·월 모두 없으면 null) */
function effAge(pt){
  const y=parseFloat(pt?.age), m=parseInt(pt?.ageMonths)||0;
  if(isNaN(y)&&!m) return null;
  return (isNaN(y)?0:y)+m/12;
}
/* JSON 파일 저장 — Chrome/Edge는 "저장 위치 선택"창(폴더 직접 지정), 그 외 브라우저는 다운로드 폴더 */
async function downloadJSON(text, filename){
  filename=String(filename).replace(/[\\/:*?"<>|]/g,'_');  // 파일명 안전화
  if(window.showSaveFilePicker){
    try{
      const handle=await window.showSaveFilePicker({suggestedName:filename,
        types:[{description:'JSON 파일',accept:{'application/json':['.json']}}]});
      const w=await handle.createWritable();await w.write(text);await w.close();
      return;
    }catch(e){if(e&&e.name==='AbortError') return;}  // 사용자가 취소하면 중단
  }
  // fallback: 브라우저 기본 다운로드 폴더
  const blob=new Blob([text],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
/* ═══ CBC 나이별 정상값(Mean) — Nathan & Oski's Hematology A1.8(적혈구)·A1.19(백혈구)
   대상 7항목: WBC, RBC, Hb, Hct, MCV, MCH, MCHC (그 외 CBC 항목은 성인 고정)
   ※ 반환값(자동 정상결과)만 나이별. 참고치(하한/상한·▲▼ 판정)는 성인 LAB_ITEM_DEF 고정 ═══ */
const CBC_AGE_REF=[ // ageY < maxY 인 첫 구간 적용 (12세 미만, 성별 무관)
  {maxY:1,  v:{WBC:11.9, RBC:3.8, Hb:11.5, Hct:35, MCV:91, MCH:30, MCHC:33}}, // <1세 영아(~3–6개월 기준)
  {maxY:2,  v:{WBC:11.0, RBC:4.5, Hb:12.0, Hct:36, MCV:78, MCH:27, MCHC:33}}, // 1–2세
  {maxY:6,  v:{WBC:9.1,  RBC:4.6, Hb:12.5, Hct:37, MCV:81, MCH:27, MCHC:34}}, // 2–6세
  {maxY:12, v:{WBC:8.2,  RBC:4.6, Hb:13.5, Hct:40, MCV:86, MCH:29, MCHC:34}}, // 6–12세
];
const CBC_TEEN ={F:{WBC:7.8,RBC:4.6,Hb:14.0,Hct:41,MCV:90,MCH:30,MCHC:34}, M:{WBC:7.8,RBC:4.9,Hb:14.5,Hct:43,MCV:88,MCH:30,MCHC:34}}; // 12–18세
const CBC_ADULT={F:{WBC:7.4,RBC:4.6,Hb:14.0,Hct:42,MCV:90,MCH:30,MCHC:34}, M:{WBC:7.4,RBC:5.2,Hb:15.5,Hct:47,MCV:90,MCH:30,MCHC:34}}; // ≥18세
function genCBCNormal(name, ageY, sex){
  if(!(name in (CBC_ADULT.M))) return null; // CBC 나이별 7항목이 아니면 패스
  const s = (sex==='F') ? 'F' : 'M';
  let v;
  if(ageY>=18)      v=CBC_ADULT[s];
  else if(ageY>=12) v=CBC_TEEN[s];
  else              v=(CBC_AGE_REF.find(b=>ageY<b.maxY)||CBC_AGE_REF[CBC_AGE_REF.length-1]).v;
  return String(v[name]);
}

/* 미설정 검사 정상값 자동 생성 — CBC는 나이/성별별 Mean, 그 외는 참고치 기반(결정적). 정성검사는 Negative/Normal */
function _decimals(n){if(n==null)return 0;const s=String(n),i=s.indexOf('.');return i<0?0:s.length-i-1;}
function genNormalValue(name, ageY, sex){
  // CBC 나이별 7항목 우선
  const cbc=genCBCNormal(name, (ageY==null?18:ageY), sex);
  if(cbc!=null) return cbc;
  // 정성/특수 항목: 명시적 정상 표기
  const QUAL={'Albumin':'Negative','Glucose':'Negative','Ketone':'Negative','Bilirubin':'Negative','Occult blood':'Negative','Urobilinogen':'Normal','Nitrite':'Negative','WBC(UA)':'Negative','RDW':'13.0','eGFR(Schwartz)':'100'};
  if(QUAL[name]!=null) return QUAL[name];
  // 상한전용 마커: '상한×0.5'는 우상향 분포에서 과대평가 → 건강인 실제 정상값을 명시 지정
  const MARKER_NORMAL={'Total cholesterol':'170','AST(SGOT)':'20','ALT(SGPT)':'20','Procalcitonin':'0.05','D-dimer':'0.20','Troponin I':'2','CK-MB':'1.5','Myoglobin':'40','BNP':'12'};
  if(MARKER_NORMAL[name]!=null) return MARKER_NORMAL[name];
  const d=LAB_ITEM_DEF[name]||{};
  const dec=Math.max(_decimals(d.lo),_decimals(d.hi));
  if(d.lo!=null&&d.hi!=null) return ((d.lo+d.hi)/2).toFixed(dec);   // 양측 참고치 → 중앙값
  if(d.lo==null&&d.hi!=null) return (d.hi*0.5).toFixed(Math.max(dec,1)); // 상한만 → 상한의 50%
  if(d.lo!=null&&d.hi==null) return (d.lo*1.2).toFixed(dec);        // 하한만 → 하한 약간 위
  return '';
}

App.init();

/* ═══ 열 리사이즈 ═══ */
function initColResize(container){
  (container||document.getElementById('mid-body'))?.querySelectorAll('.emr-table').forEach(table=>{
    const cols=table.querySelectorAll('col');
    // 모든 col에 실제 렌더링 너비 px 고정, 테이블 너비도 고정
    if(!table._rhInit){
      table._rhInit=true;
      const ths=table.querySelectorAll('thead th');
      let total=0;
      ths.forEach((th,i)=>{
        const w=th.offsetWidth;
        if(cols[i]) cols[i].style.width=w+'px';
        total+=w;
      });
      table.style.width=total+'px';
      table.style.tableLayout='fixed';
      table.style.minWidth='unset';
    }
    table.querySelectorAll('th .col-rh').forEach((handle,i)=>{
      if(handle._rh) return; handle._rh=true;
      handle.addEventListener('mousedown',e=>{
        e.preventDefault();
        const startX=e.clientX;
        // 드래그 시작 시점에 mid-body 안 모든 테이블의 열 너비 캡처 → 동기화
        const allTables=Array.from((container||document.getElementById('mid-body'))?.querySelectorAll('.emr-table')||[]);
        const tableStates=allTables.map(tbl=>{
          const tCols=tbl.querySelectorAll('col');
          return {
            cols:tCols,
            startW:tCols[i]?parseInt(tCols[i].style.width)||tCols[i].offsetWidth:handle.closest('th').offsetWidth,
            startNextW:tCols[i+1]?parseInt(tCols[i+1].style.width)||tCols[i+1].offsetWidth:null
          };
        });
        const onMove=e=>{
          const delta=e.clientX-startX;
          const minW=40;
          tableStates.forEach(({cols,startW,startNextW})=>{
            if(startNextW!=null){
              const newW=Math.min(Math.max(minW,startW+delta),startW+startNextW-minW);
              const newNextW=startW+startNextW-newW;
              if(cols[i]) cols[i].style.width=newW+'px';
              if(cols[i+1]) cols[i+1].style.width=newNextW+'px';
            } else {
              const newW=Math.max(minW,startW+delta);
              if(cols[i]) cols[i].style.width=newW+'px';
            }
          });
        };
        const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp);
      });
    });
  });
}
/* ═══ 교육자모드 자동완성 헬퍼 ═══ */
function admAC(inputId, ddId, allOptions, onSelect){
  const inp=document.getElementById(inputId);
  const dd=document.getElementById(ddId);
  if(!inp||!dd||inp._admACReady) return;
  inp._admACReady=true;
  function render(){
    const q=(inp.value||'').toLowerCase().trim();
    const filtered=allOptions.filter(o=>!q||o.toLowerCase().includes(q));
    if(!filtered.length){dd.style.display='none';return;}
    dd.innerHTML='';
    filtered.forEach(o=>{
      const el=document.createElement('div');
      el.className='adm-ac-item';
      el.textContent=o;
      el.addEventListener('mousedown',e=>e.preventDefault());
      el.addEventListener('click',()=>{inp.value=o;dd.style.display='none';if(onSelect) onSelect(o);});
      dd.appendChild(el);
    });
    dd.style.display='block';
  }
  inp.addEventListener('input',render);
  inp.addEventListener('focus',render);
  inp.addEventListener('blur',()=>setTimeout(()=>{dd.style.display='none';},150));
}
